<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--ml-surface-base);font-family:var(--ml-font-sans);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{border-radius:3px;padding:14px 12px;display:flex;flex-direction:column;gap:6px;height:90px;justify-content:flex-end;border:1px solid var(--ml-surface-line);}
  .name{font-size:0.62em;letter-spacing:0.14em;text-transform:uppercase;color:var(--ml-fg-2);}
  .hex{font-family:var(--ml-font-serif);font-style:italic;font-size:0.85em;color:var(--ml-fg-5);}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#141412;"><div class="name">Deepest</div><div class="hex">#141412</div></div>
  <div class="sw" style="background:#1a1a18;"><div class="name">Base</div><div class="hex">#1a1a18</div></div>
  <div class="sw" style="background:#1f1f1c;"><div class="name">Raised</div><div class="hex">#1f1f1c</div></div>
  <div class="sw" style="background:#2a2a26;"><div class="name">Line</div><div class="hex">#2a2a26</div></div>
</div></body></html>
