<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--ml-surface-base);font-family:var(--ml-font-sans);}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .sw{border-radius:3px;padding:10px 8px;display:flex;flex-direction:column;gap:4px;height:90px;justify-content:flex-end;background:#1f1f1c;}
  .chip{width:28px;height:28px;border-radius:3px;}
  .name{font-size:0.58em;letter-spacing:0.1em;text-transform:uppercase;color:var(--ml-fg-4);}
  .hex{font-family:var(--ml-font-serif);font-style:italic;font-size:0.75em;color:var(--ml-fg-5);}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#d8d2c4"></div><div class="name">FG-1</div><div class="hex">#d8d2c4</div></div>
  <div class="sw"><div class="chip" style="background:#c8c0b0"></div><div class="name">FG-2</div><div class="hex">#c8c0b0</div></div>
  <div class="sw"><div class="chip" style="background:#a8a098"></div><div class="name">FG-3</div><div class="hex">#a8a098</div></div>
  <div class="sw"><div class="chip" style="background:#6a6a62"></div><div class="name">FG-4</div><div class="hex">#6a6a62</div></div>
  <div class="sw"><div class="chip" style="background:#5a5a52"></div><div class="name">FG-5</div><div class="hex">#5a5a52</div></div>
  <div class="sw"><div class="chip" style="background:#4a4a42"></div><div class="name">FG-6</div><div class="hex">#4a4a42</div></div>
  <div class="sw"><div class="chip" style="background:#3a3a32"></div><div class="name">FG-7</div><div class="hex">#3a3a32</div></div>
</div></body></html>
