<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--ml-surface-base);font-family:var(--ml-font-sans);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .sw{height:90px;border-radius:3px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;background:#1f1f1c;}
  .top{display:flex;align-items:center;gap:8px;}
  .chip{width:34px;height:34px;border-radius:3px;background:#a58a5c;}
  .name{font-size:0.6em;letter-spacing:0.14em;text-transform:uppercase;color:var(--ml-fg-2);}
  .hex{font-family:var(--ml-font-serif);font-style:italic;font-size:0.8em;color:var(--ml-fg-5);}
</style></head><body>
<div class="row">
  <div class="sw"><div class="top"><div class="chip"></div><div class="name">Brass</div></div><div class="hex">#a58a5c · primary accent</div></div>
  <div class="sw"><div class="top"><div class="chip" style="background:#a58a5c66"></div><div class="name">Brass /66</div></div><div class="hex">#a58a5c66 · top borders</div></div>
  <div class="sw"><div class="top"><div class="chip" style="background:#a58a5c44"></div><div class="name">Brass /44</div></div><div class="hex">#a58a5c44 · ornaments</div></div>
  <div class="sw" style="background:rgba(165,138,92,0.08);border:1px solid #a58a5c;"><div class="top"><div class="chip" style="background:rgba(165,138,92,0.08);border:1px solid #a58a5c;"></div><div class="name">Glow</div></div><div class="hex" style="color:#a58a5c">rgba(...,0.08) · active fill</div></div>
</div></body></html>
