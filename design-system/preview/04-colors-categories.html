<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--ml-surface-base);font-family:var(--ml-font-sans);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .card{background:#1f1f1c;border-radius:3px;padding:14px 16px;height:90px;display:flex;flex-direction:column;justify-content:space-between;}
  .card.work{border-left:2px solid #5a8aaa;}
  .card.creativity{border-left:2px solid #8870aa;}
  .card.family{border-left:2px solid #5a8a70;}
  .card.inspiration{border-left:2px solid #a58a5c;}
  .meta{font-size:0.62em;letter-spacing:0.14em;text-transform:uppercase;color:#5a5a52;}
  .label{font-size:0.7em;letter-spacing:0.16em;text-transform:uppercase;color:#c8c0b0;}
  .hex{font-family:var(--ml-font-serif);font-style:italic;font-size:0.78em;color:#5a5a52;}
</style></head><body>
<div class="row">
  <div class="card work"><div class="meta">» Work</div><div class="label">Slate Blue</div><div class="hex">#5a8aaa</div></div>
  <div class="card creativity"><div class="meta">» Creativity</div><div class="label">Dusk Violet</div><div class="hex">#8870aa</div></div>
  <div class="card family"><div class="meta">» Family</div><div class="label">Moss Green</div><div class="hex">#5a8a70</div></div>
  <div class="card inspiration"><div class="meta">» Inspiration</div><div class="label">Brass</div><div class="hex">#a58a5c</div></div>
</div></body></html>
