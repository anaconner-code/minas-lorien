<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--ml-surface-base);font-family:var(--ml-font-sans);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{background:#1f1f1c;border-radius:3px;padding:14px 16px;height:90px;display:flex;flex-direction:column;justify-content:space-between;}
  .top{display:flex;align-items:center;gap:10px;}
  .chip{width:24px;height:24px;border-radius:3px;}
  .name{font-size:0.6em;letter-spacing:0.14em;text-transform:uppercase;color:#c8c0b0;}
  .hex{font-family:var(--ml-font-serif);font-style:italic;font-size:0.78em;color:#5a5a52;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="top"><div class="chip" style="background:#5a8a70"></div><div class="name">OK / Synced</div></div><div class="hex">#5a8a70</div></div>
  <div class="sw"><div class="top"><div class="chip" style="background:#a58a5c"></div><div class="name">Syncing</div></div><div class="hex">#a58a5c</div></div>
  <div class="sw"><div class="top"><div class="chip" style="background:#aa5a5a"></div><div class="name">Error</div></div><div class="hex">#aa5a5a</div></div>
  <div class="sw"><div class="top"><div class="chip" style="background:#5a8aaa"></div><div class="name">Link</div></div><div class="hex">#5a8aaa</div></div>
</div></body></html>
