<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px 24px;background:var(--ml-surface-base);}
  .stack{display:flex;flex-direction:column;gap:18px;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .label{font-family:var(--ml-font-sans);font-size:0.6em;letter-spacing:0.14em;text-transform:uppercase;color:#5a5a52;width:120px;flex-shrink:0;}
  .h1{font-family:'Raleway',sans-serif;font-weight:300;font-size:1.4em;letter-spacing:0.2em;text-transform:uppercase;color:#c8c0b0;}
  .h1 span{color:#a58a5c;}
  .h3{font-family:'Raleway',sans-serif;font-weight:500;font-size:0.75em;letter-spacing:0.16em;text-transform:uppercase;color:#c8c0b0;}
  .tag{font-family:'Newsreader',serif;font-style:italic;font-size:0.95em;color:#5a5a52;}
</style></head><body>
<div class="stack">
  <div class="row"><div class="label">H1 / Wordmark</div><div class="h1">Minas <span>Lórien</span></div></div>
  <div class="row"><div class="label">H3 / Form</div><div class="h3">Add a New Entry</div></div>
  <div class="row"><div class="label">Tagline</div><div class="tag">Your tower of light and memory</div></div>
</div></body></html>
