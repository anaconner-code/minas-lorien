<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--ml-surface-base);}
  .stack{display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .label{font-family:'Raleway',sans-serif;font-size:0.6em;letter-spacing:0.14em;text-transform:uppercase;color:#5a5a52;width:140px;flex-shrink:0;}
  .body{font-family:'Newsreader',serif;font-size:1em;line-height:1.75;color:#c8c0b0;}
  .quote{font-family:'Newsreader',serif;font-style:italic;font-size:1.2em;line-height:1.9;color:#d8d2c4;}
  .meta{font-family:'Raleway',sans-serif;font-size:0.68em;letter-spacing:0.12em;text-transform:uppercase;color:#5a5a52;}
</style></head><body>
<div class="stack">
  <div class="row"><div class="label">Body / Newsreader</div><div class="body">Quiet, candle-lit elven study.</div></div>
  <div class="row"><div class="label">Quote / Italic</div><div class="quote">Your tower of light and memory.</div></div>
  <div class="row"><div class="label">Meta / Raleway</div><div class="meta">» Inspiration · Quote</div></div>
</div></body></html>
