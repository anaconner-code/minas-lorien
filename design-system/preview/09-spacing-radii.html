<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--ml-surface-base);}
  .row{display:flex;gap:24px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{background:#1f1f1c;border:1px solid #2a2a26;}
  .name{font-family:'Raleway',sans-serif;font-size:0.6em;letter-spacing:0.14em;text-transform:uppercase;color:#5a5a52;}
  .hex{font-family:'Newsreader',serif;font-style:italic;font-size:0.75em;color:#6a6a62;}
</style></head><body>
<div class="row">
  <div class="item"><div class="box" style="width:72px;height:72px;border-radius:2px;"></div><div class="name">Sm · 2px</div><div class="hex">inputs · chips · btns</div></div>
  <div class="item"><div class="box" style="width:72px;height:72px;border-radius:3px;"></div><div class="name">Md · 3px</div><div class="hex">cards · spotlight</div></div>
  <div class="item"><div class="box" style="width:72px;height:72px;border-radius:4px;"></div><div class="name">Lg · 4px</div><div class="hex">login box only</div></div>
  <div class="item" style="margin-left:24px;"><div style="width:280px;height:1px;background:linear-gradient(to right,transparent,#a58a5c44,#a58a5c66,#a58a5c44,transparent);"></div><div class="name">Brass hairline</div><div class="hex">below header</div></div>
</div></body></html>
