<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--ml-surface-base);}
  .row{display:flex;gap:14px;align-items:flex-end;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .b{background:#a58a5c;border-radius:2px;width:18px;}
  .lbl{font-family:'Raleway',sans-serif;font-size:0.58em;letter-spacing:0.12em;text-transform:uppercase;color:#5a5a52;}
  .px{font-family:'Newsreader',serif;font-style:italic;font-size:0.72em;color:#6a6a62;}
</style></head><body>
<div class="row">
  <div class="col"><div class="b" style="height:4px"></div><div class="lbl">1</div><div class="px">4</div></div>
  <div class="col"><div class="b" style="height:6px"></div><div class="lbl">2</div><div class="px">6</div></div>
  <div class="col"><div class="b" style="height:8px"></div><div class="lbl">3</div><div class="px">8</div></div>
  <div class="col"><div class="b" style="height:10px"></div><div class="lbl">4</div><div class="px">10</div></div>
  <div class="col"><div class="b" style="height:12px"></div><div class="lbl">5</div><div class="px">12</div></div>
  <div class="col"><div class="b" style="height:16px"></div><div class="lbl">6</div><div class="px">16</div></div>
  <div class="col"><div class="b" style="height:20px"></div><div class="lbl">7</div><div class="px">20</div></div>
  <div class="col"><div class="b" style="height:24px"></div><div class="lbl">8</div><div class="px">24</div></div>
  <div class="col"><div class="b" style="height:28px"></div><div class="lbl">9</div><div class="px">28</div></div>
  <div class="col"><div class="b" style="height:32px"></div><div class="lbl">10</div><div class="px">32</div></div>
  <div class="col"><div class="b" style="height:40px"></div><div class="lbl">12</div><div class="px">40</div></div>
</div></body></html>
