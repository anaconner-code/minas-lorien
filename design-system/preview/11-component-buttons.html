<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--ml-surface-base);font-family:'Raleway',sans-serif;}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .btn-primary{padding:11px 22px;background:transparent;color:#a58a5c;border:1px solid #a58a5c;border-radius:2px;font-size:0.75em;letter-spacing:0.20em;text-transform:uppercase;font-weight:500;}
  .btn-primary.solid{background:#a58a5c;color:#141412;}
  .btn-secondary{padding:11px 22px;background:transparent;color:#6a6a62;border:1px solid #2e2e28;border-radius:2px;font-size:0.72em;letter-spacing:0.18em;text-transform:uppercase;}
  .lbl{font-family:'Newsreader',serif;font-style:italic;font-size:0.75em;color:#5a5a52;width:100%;margin-top:6px;}
</style></head><body>
<div class="row">
  <button class="btn-primary">Enter the Tower</button>
  <button class="btn-primary solid">Save to Vault</button>
  <button class="btn-secondary">Show me something</button>
</div>
<div class="lbl">primary idle · primary hover (inverted) · secondary</div>
</body></html>
