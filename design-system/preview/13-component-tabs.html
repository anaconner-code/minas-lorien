<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--ml-surface-base);font-family:'Raleway',sans-serif;}
  .tabs{display:flex;background:#141412;padding:0 20px;border-bottom:1px solid #2a2a26;}
  .tab{padding:11px 18px;cursor:pointer;border-bottom:1px solid transparent;color:#6a6a62;font-size:0.72em;font-weight:400;letter-spacing:0.14em;text-transform:uppercase;}
  .tab.active{border-bottom-color:#a58a5c;color:#c8c0b0;}
  .status{text-align:center;font-size:0.65em;letter-spacing:0.1em;padding:6px;background:#141412;color:#5a8a70;border-bottom:1px solid #2a2a26;}
  .lbl{font-family:'Newsreader',serif;font-style:italic;font-size:0.75em;color:#5a5a52;padding:14px 24px;}
</style></head><body>
<div class="tabs">
  <div class="tab active">Inspire</div>
  <div class="tab">Vault</div>
  <div class="tab">Add</div>
</div>
<div class="status">VAULT SYNCED · 12 ENTRIES</div>
<div class="lbl">tab row + status bar — brass underline marks active</div>
</body></html>
