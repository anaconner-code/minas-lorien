<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--ml-surface-base);}
  .form{background:#1f1f1c;border-radius:3px;padding:18px;display:flex;flex-direction:column;gap:10px;}
  .lbl{font-family:'Raleway',sans-serif;font-size:0.67em;letter-spacing:0.12em;text-transform:uppercase;color:#5a5a52;}
  .input{padding:11px 14px;background:#141412;border:1px solid #2a2a26;border-radius:2px;color:#d8d2c4;font-family:'Newsreader',serif;font-size:0.95em;}
  .input.focus{border-color:#a58a5c;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
</style></head><body>
<div class="form">
  <div class="row">
    <div><div class="lbl">Category</div><div class="input">Inspiration</div></div>
    <div><div class="lbl">Type</div><div class="input focus">Quote</div></div>
  </div>
  <div><div class="lbl">Title</div><div class="input" style="color:#5a5a52;font-style:italic">Title — e.g. Q3 review from Sarah</div></div>
</div></body></html>
