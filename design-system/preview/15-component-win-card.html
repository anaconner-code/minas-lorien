<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--ml-surface-base);}
  .stack{display:flex;flex-direction:column;gap:8px;}
  .card{background:#1f1f1c;border-radius:3px;padding:14px 16px;display:flex;gap:14px;}
  .card.work{border-left:2px solid #5a8aaa;}
  .card.fam{border-left:2px solid #5a8a70;}
  .body{flex:1;}
  .meta{font-family:'Raleway',sans-serif;font-size:0.65em;letter-spacing:0.12em;text-transform:uppercase;color:#5a5a52;margin-bottom:6px;}
  .text{font-family:'Newsreader',serif;font-size:0.95em;line-height:1.7;color:#c8c0b0;}
  .thumb{width:56px;height:56px;border-radius:3px;background:linear-gradient(135deg,#3a3a32,#1f1f1c);flex-shrink:0;}
  .chev{color:#a58a5c;margin-right:5px;}
</style></head><body>
<div class="stack">
  <div class="card work">
    <div class="body"><div class="meta"><span class="chev">»</span>Work · Feedback</div><div class="text">"Your work on the Q3 launch was the difference."</div></div>
    <div class="thumb"></div>
  </div>
  <div class="card fam">
    <div class="body"><div class="meta"><span class="chev">»</span>Family · Memory</div><div class="text">First snow of the year — Mira tried to catch it.</div></div>
  </div>
</div></body></html>
