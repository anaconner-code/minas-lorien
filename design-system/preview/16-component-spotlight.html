<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--ml-surface-base);}
  .spot{background:#1f1f1c;border-radius:3px;padding:24px 26px;position:relative;border-top:2px solid #a58a5c;}
  .spot::before{content:'';position:absolute;top:10px;left:10px;width:18px;height:18px;border-top:1px solid #a58a5c44;border-left:1px solid #a58a5c44;}
  .spot::after{content:'';position:absolute;bottom:10px;right:10px;width:18px;height:18px;border-bottom:1px solid #a58a5c44;border-right:1px solid #a58a5c44;}
  .meta{font-family:'Raleway',sans-serif;font-size:0.65em;letter-spacing:0.14em;text-transform:uppercase;color:#5a5a52;margin-bottom:12px;}
  .meta .chev{color:#a58a5c;margin-right:6px;}
  .quote{font-family:'Newsreader',serif;font-style:italic;font-size:1.05em;line-height:1.85;color:#d8d2c4;}
  .rule{margin-top:14px;display:flex;align-items:center;gap:10px;}
  .rule::before,.rule::after{content:'';flex:1;height:1px;background:#2a2a26;}
  .dot{color:#3a3a32;font-size:0.7em;letter-spacing:0.1em;}
</style></head><body>
<div class="spot">
  <div class="meta"><span class="chev">»</span>Inspiration · Quote</div>
  <div class="quote">The world is changed. I feel it in the water, I feel it in the earth, I smell it in the air.</div>
  <div class="rule"><span class="dot">· · ·</span></div>
</div></body></html>
