<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--ml-surface-base);font-family:'Raleway',sans-serif;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .cell{background:#1f1f1c;border-radius:3px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;height:80px;justify-content:center;}
  .glyph{font-size:1.6em;}
  .name{font-size:0.6em;letter-spacing:0.12em;text-transform:uppercase;color:#5a5a52;}
  .chev{color:#a58a5c;font-size:1.4em;font-weight:bold;}
  .chev .b{opacity:0.45;}
</style></head><body>
<div class="grid">
  <div class="cell"><span class="chev">»</span><div class="name">Chevron</div></div>
  <div class="cell"><span style="color:#3a3a32;letter-spacing:0.2em">· · ·</span><div class="name">Mid-dot rule</div></div>
  <div class="cell"><span class="glyph">🖼️</span><div class="name">Image attach</div></div>
  <div class="cell"><span class="glyph">📄</span><div class="name">PDF attach</div></div>
  <div class="cell"><span class="glyph">🎵</span><div class="name">Audio</div></div>
  <div class="cell"><span class="glyph">🎬</span><div class="name">Video</div></div>
  <div class="cell"><span class="glyph">▶️</span><div class="name">YouTube</div></div>
  <div class="cell"><span style="color:#5a5a52;font-size:1.4em">↗</span><div class="name">Open new tab</div></div>
</div></body></html>
