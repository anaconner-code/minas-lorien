<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minas Lórien</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: #2d3a3a;
      color: #dde4e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1e2d3a;
      padding: 20px 30px;
      border-bottom: 1px solid #3a5a6a;
    }
    header h1 {
      font-family: 'Raleway', sans-serif;
      font-size: 1.6em;
      font-weight: 300;
      color: #c8d8d0;
      letter-spacing: 0.15em;
    }
    header h1 span { color: #c9a84c; }
    header p {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.95em;
      color: #7a9a8a;
      margin-top: 3px;
    }
    .tabs {
      display: flex;
      background: #1e2d3a;
      padding: 0 20px;
      border-bottom: 1px solid #3a5a6a;
    }
    .tab {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: #7a9a8a;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8em;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .tab.active { border-bottom-color: #c9a84c; color: #c8d8d0; }
    .tab:hover { color: #c8d8d0; }
    .content { flex: 1; padding: 25px 20px; overflow-y: auto; }
    .surprise-btn {
      display: block;
      margin: 0 auto 30px;
      padding: 14px 40px;
      background: transparent;
      color: #c9a84c;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.85em;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      width: 100%;
      max-width: 400px;
    }
    .surprise-btn:hover {
      background: #c9a84c;
      color: #1e2d3a;
    }
    .category-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 3px;
      border: 1px solid #3a5a6a;
      background: transparent;
      color: #7a9a8a;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: 0.75em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #c9a84c; color: #c8d8d0; }
    .filter-btn.active {
      background: #c9a84c;
      border-color: #c9a84c;
      color: #1e2d3a;
      font-weight: 600;
    }
    .win-card {
      background: #263340;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      display: flex;
      gap: 15px;
      align-items: flex-start;
      box-shadow: 0 1px 6px rgba(0,0,0,0.2);
    }
    .win-card.cat-work { border-left: 3px solid #6aaacc; }
    .win-card.cat-creativity { border-left: 3px solid #a088cc; }
    .win-card.cat-family { border-left: 3px solid #6aaa88; }
    .win-card.cat-inspiration { border-left: 3px solid #c9a84c; }
    .win-card-text { flex: 1; min-width: 0; }
    .win-card .category-badge {
      display: inline-block;
      font-family: 'Raleway', sans-serif;
      font-size: 0.65em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 3px;
      margin-bottom: 6px;
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    .badge-work { background: #1a3040; color: #6aaacc; }
    .badge-creativity { background: #251a3a; color: #a088cc; }
    .badge-family { background: #1a3028; color: #6aaa88; }
    .badge-inspiration { background: #2a2010; color: #c9a84c; }
    .win-card .tag {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.85em;
      color: #7a9a8a;
      margin-bottom: 8px;
    }
    .win-card .text {
      font-family: 'EB Garamond', serif;
      font-size: 1em;
      line-height: 1.7;
      color: #dde4e0;
      word-break: break-word;
    }
    .win-card img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .win-card .delete {
      position: absolute;
      top: 8px; right: 8px;
      background: none;
      border: none;
      color: #3a5a6a;
      cursor: pointer;
      font-size: 1em;
      padding: 4px;
      transition: color 0.2s;
    }
    .win-card .delete:hover { color: #cc6a6a; }
    .win-card .edit {
      position: absolute;
      top: 8px; right: 30px;
      background: none;
      border: none;
      color: #3a5a6a;
      cursor: pointer;
      font-size: 1em;
      padding: 4px;
      transition: color 0.2s;
    }
    .win-card .edit:hover { color: #c9a84c; }
    .link-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1e2d3a;
      border: 1px solid #3a5a6a;
      border-radius: 4px;
      padding: 10px 14px;
      margin-top: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .link-card:hover { border-color: #c9a84c; background: #263340; }
    .link-card .link-icon { font-size: 1.3em; flex-shrink: 0; }
    .link-card .link-info { flex: 1; overflow: hidden; }
    .link-card .link-title {
      font-family: 'Raleway', sans-serif;
      font-size: 0.85em;
      color: #c8d8d0;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-card .link-url {
      font-size: 0.75em;
      color: #6aaacc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-card .link-arrow { color: #7a9a8a; }
    .spotlight {
      background: #263340;
      border-radius: 8px;
      padding: 30px;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    @media (min-width: 600px) {
      .spotlight { flex-direction: row; align-items: center; }
    }
    .spotlight.cat-work { border-top: 2px solid #6aaacc; }
    .spotlight.cat-creativity { border-top: 2px solid #a088cc; }
    .spotlight.cat-family { border-top: 2px solid #6aaa88; }
    .spotlight.cat-inspiration { border-top: 2px solid #c9a84c; }
    .spotlight-text { flex: 1; }
    .spotlight .tag {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      color: #7a9a8a;
      margin-bottom: 12px;
      font-size: 0.95em;
      display: block;
    }
    .spotlight .text {
      font-family: 'EB Garamond', serif;
      font-size: 1.2em;
      line-height: 1.9;
      color: #dde4e0;
      word-break: break-word;
    }
    .spotlight img {
      width: 100%;
      max-width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      align-self: center;
    }
    .inspire-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 25px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .add-form {
      background: #263340;
      border-radius: 6px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .add-form h3 {
      font-family: 'Raleway', sans-serif;
      font-size: 0.85em;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 18px;
      color: #c8d8d0;
    }
    .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .form-row select { flex: 1; min-width: 120px; margin-bottom: 0; }
    .add-form select, .add-form input, .add-form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      background: #1e2d3a;
      border: 1px solid #3a5a6a;
      border-radius: 4px;
      color: #dde4e0;
      font-family: 'EB Garamond', serif;
      font-size: 1em;
      transition: border-color 0.2s;
    }
    .add-form select:focus, .add-form input:focus, .add-form textarea:focus {
      outline: none;
      border-color: #c9a84c;
    }
    .add-form textarea { height: 120px; resize: vertical; }
    .add-form button {
      width: 100%;
      padding: 13px 25px;
      background: transparent;
      color: #c9a84c;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8em;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      transition: all 0.2s;
    }
    .add-form button:hover {
      background: #c9a84c;
      color: #1e2d3a;
    }
    .image-upload-area {
      border: 1px dashed #3a5a6a;
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
      cursor: pointer;
      color: #7a9a8a;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      transition: all 0.2s;
    }
    .image-upload-area:hover { border-color: #c9a84c; color: #dde4e0; }
    .image-preview {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 4px;
      margin-bottom: 12px;
      display: none;
    }
    .empty {
      text-align: center;
      color: #3a5a6a;
      padding: 40px;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 1.1em;
    }
    .count-badge {
      background: #1e2d3a;
      color: #7a9a8a;
      font-size: 0.75em;
      padding: 2px 7px;
      border-radius: 3px;
      margin-left: 6px;
    }
    .status-bar {
      text-align: center;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.85em;
      padding: 5px;
      background: #1e2d3a;
      color: #7a9a8a;
      border-bottom: 1px solid #3a5a6a;
    }
    .status-bar.synced { color: #6aaa88; }
    .status-bar.syncing { color: #c9a84c; }
    .status-bar.error { color: #cc6a6a; }
  </style>
</head>
<body>
  <header>
    <h1>🏰 Minas <span>Lórien</span></h1>
    <p>Your tower of light and memory</p>
  </header>

  <div class="tabs">
    <div class="tab active" id="btn-inspire">✨ Inspire Me</div>
    <div class="tab" id="btn-vault">📁 My Vault</div>
    <div class="tab" id="btn-add">➕ Add Entry</div>
  </div>

  <div class="status-bar" id="status-bar">⏳ Connecting to your vault...</div>

  <div class="content">

    <div id="tab-inspire">
      <div class="inspire-filters">
        <button class="filter-btn active" data-cat="all">🏰 All</button>
        <button class="filter-btn" data-cat="Work">💼 Work</button>
        <button class="filter-btn" data-cat="Creativity">🎨 Creativity</button>
        <button class="filter-btn" data-cat="Family">👨‍👩‍👧 Family</button>
        <button class="filter-btn" data-cat="Inspiration">✨ Inspiration</button>
      </div>
      <button class="surprise-btn" id="surprise-btn">🎲 Show Me Something</button>
      <div id="spotlight"></div>
    </div>

    <div id="tab-vault" style="display:none">
      <div class="category-filters">
        <button class="filter-btn active" data-filter="all">All <span class="count-badge" id="count-all">0</span></button>
        <button class="filter-btn" data-filter="Work">💼 Work <span class="count-badge" id="count-work">0</span></button>
        <button class="filter-btn" data-filter="Creativity">🎨 Creativity <span class="count-badge" id="count-creativity">0</span></button>
        <button class="filter-btn" data-filter="Family">👨‍👩‍👧 Family <span class="count-badge" id="count-family">0</span></button>
        <button class="filter-btn" data-filter="Inspiration">✨ Inspiration <span class="count-badge" id="count-inspiration">0</span></button>
      </div>
      <div id="vault-list"></div>
    </div>

    <div id="tab-add" style="display:none">
      <div class="add-form">
        <h3 id="add-form-title">Add a New Entry</h3>
        <div class="form-row">
          <select id="win-category">
            <option value="Work">💼 Work</option>
            <option value="Creativity">🎨 Creativity</option>
            <option value="Family">👨‍👩‍👧 Family</option>
            <option value="Inspiration">✨ Inspiration</option>
          </select>
          <select id="win-type">
            <option value="Feedback">💬 Feedback</option>
            <option value="Review">⭐ Performance Review</option>
            <option value="Achievement">🏅 Achievement</option>
            <option value="Quote">💡 Quote</option>
            <option value="Link">🔗 Link</option>
            <option value="Note">📝 Note</option>
            <option value="Memory">💛 Memory</option>
          </select>
        </div>
        <input id="win-title" type="text" placeholder="Title (e.g. 'Inspiring video' or 'Q3 review from Sarah')">
        <textarea id="win-text" placeholder="Paste your content here — feedback, a quote, a URL, a memory, anything!"></textarea>
        <img id="image-preview" class="image-preview">
        <div class="image-upload-area" id="upload-area">
          📷 Click to attach an image (optional)
        </div>
        <input type="file" id="image-input" accept="image/*" style="display:none">
        <button id="save-btn">Save to Minas Lórien ✨</button>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDi-jwSpGo0OWt5wcRp6wGSfYX0qAveO3k",
      authDomain: "minas-lorien.firebaseapp.com",
      projectId: "minas-lorien",
      storageBucket: "minas-lorien.firebasestorage.app",
      messagingSenderId: "756139418843",
      appId: "1:756139418843:web:858ee8cf548802ef0358fe"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const winsCollection = collection(db, 'wins');

    var wins = [];
    var currentImageData = null;
    var currentVaultFilter = 'all';
    var currentInspireFilter = 'all';
    var editingId = null;

    function setStatus(msg, type) {
      var bar = document.getElementById('status-bar');
      bar.textContent = msg;
      bar.className = 'status-bar ' + (type || '');
    }

  async function loadWins() {
      try {
        setStatus('⏳ Loading your vault...', 'syncing');
        var snapshot = await getDocs(winsCollection);
        wins = [];
        snapshot.forEach(function(docSnap) {
          wins.push(Object.assign({ firestoreId: docSnap.id }, docSnap.data()));
        });
        setStatus('✅ Vault synced · ' + wins.length + ' entries', 'synced');
        renderVault();
        if (document.getElementById('tab-vault').style.display !== 'none') {
          renderVault();
        }
      } catch(e) {
        setStatus('⚠️ Could not connect — check your internet', 'error');
        console.error('Firebase error:', e);
      }
    }

    function isURL(str) {
      return /^(https?:\/\/)[^\s]+/.test(str.trim());
    }

    function getDomain(url) {
      try { return new URL(url.trim()).hostname.replace('www.', ''); }
      catch(e) { return url.trim(); }
    }

    function getLinkIcon(url) {
      var domain = getDomain(url);
      if (domain.includes('youtube') || domain.includes('youtu.be')) return '▶️';
      if (domain.includes('tiktok')) return '🎵';
      if (domain.includes('instagram')) return '📸';
      if (domain.includes('twitter') || domain.includes('x.com')) return '🐦';
      if (domain.includes('linkedin')) return '💼';
      if (domain.includes('spotify')) return '🎧';
      if (domain.includes('pinterest')) return '📌';
      return '🔗';
    }

    function renderText(text, type) {
      if (type === 'Link' && isURL(text)) {
        var domain = getDomain(text);
        var icon = getLinkIcon(text);
        return '<a class="link-card" href="' + text.trim() + '" target="_blank" rel="noopener">' +
          '<span class="link-icon">' + icon + '</span>' +
          '<span class="link-info">' +
            '<span class="link-title">' + domain + '</span>' +
            '<span class="link-url">' + text.trim() + '</span>' +
          '</span>' +
          '<span class="link-arrow">→</span>' +
        '</a>';
      }
      return text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
        return '<a class="link-card" href="' + url + '" target="_blank" rel="noopener" style="display:inline-flex;margin-top:6px;">' +
          '<span class="link-icon">🔗</span>' +
          '<span class="link-info"><span class="link-url">' + url + '</span></span>' +
          '<span class="link-arrow">→</span></a>';
      });
    }

    function showTab(name) {
      ['inspire','vault','add'].forEach(function(t) {
        document.getElementById('tab-' + t).style.display = 'none';
        document.getElementById('btn-' + t).classList.remove('active');
      });
      document.getElementById('tab-' + name).style.display = 'block';
      document.getElementById('btn-' + name).classList.add('active');
      if (name === 'vault') renderVault();
    }

    async function addWin() {
      var category = document.getElementById('win-category').value;
      var type = document.getElementById('win-type').value;
      var title = document.getElementById('win-title').value.trim();
      var text = document.getElementById('win-text').value.trim();
      if (!text) { alert('Please add some content!'); return; }

      var entry = { category: category, type: type, title: title, text: text, image: currentImageData, createdAt: Date.now() };

      try {
        setStatus('⏳ Saving...', 'syncing');
        if (editingId) {
          await updateDoc(doc(db, 'wins', editingId), entry);
          editingId = null;
        } else {
          await addDoc(winsCollection, entry);
        }
        setStatus('✅ Saved!', 'synced');
        document.getElementById('win-title').value = '';
        document.getElementById('win-text').value = '';
        document.getElementById('image-preview').style.display = 'none';
        document.getElementById('upload-area').textContent = '📷 Click to attach an image (optional)';
        document.getElementById('add-form-title').textContent = 'Add a New Entry';
        document.getElementById('save-btn').textContent = 'Save to Minas Lórien ✨';
        currentImageData = null;
        await loadWins();
        showTab('vault');
      } catch(e) {
        setStatus('⚠️ Could not save — ' + e.message, 'error');
      }
    }

    async function deleteWin(firestoreId) {
      try {
        setStatus('⏳ Deleting...', 'syncing');
        await deleteDoc(doc(db, 'wins', firestoreId));
        await loadWins();
        setStatus('✅ Deleted', 'synced');
      } catch(e) {
        setStatus('⚠️ Could not delete', 'error');
      }
    }

    function editWin(firestoreId) {
      var win = wins.find(function(w) { return w.firestoreId === firestoreId; });
      if (!win) return;
      document.getElementById('win-category').value = win.category || 'Work';
      document.getElementById('win-type').value = win.type;
      document.getElementById('win-title').value = win.title || '';
      document.getElementById('win-text').value = win.text;
      if (win.image) {
        currentImageData = win.image;
        var preview = document.getElementById('image-preview');
        preview.src = win.image;
        preview.style.display = 'block';
        document.getElementById('upload-area').textContent = '✅ Image attached — click to change';
      } else {
        currentImageData = null;
        document.getElementById('image-preview').style.display = 'none';
        document.getElementById('upload-area').textContent = '📷 Click to attach an image (optional)';
      }
      editingId = firestoreId;
      document.getElementById('add-form-title').textContent = 'Edit Entry';
      document.getElementById('save-btn').textContent = 'Update Entry ✨';
      showTab('add');
    }

    function getCatClass(cat) { return 'cat-' + cat.toLowerCase(); }
    function getBadgeClass(cat) { return 'badge-' + cat.toLowerCase(); }

    function renderVault() {
      var list = document.getElementById('vault-list');
      var filtered = currentVaultFilter === 'all' ? wins : wins.filter(function(w) { return w.category === currentVaultFilter; });

      document.getElementById('count-all').textContent = wins.length;
      document.getElementById('count-work').textContent = wins.filter(function(w){ return w.category === 'Work'; }).length;
      document.getElementById('count-creativity').textContent = wins.filter(function(w){ return w.category === 'Creativity'; }).length;
      document.getElementById('count-family').textContent = wins.filter(function(w){ return w.category === 'Family'; }).length;
      document.getElementById('count-inspiration').textContent = wins.filter(function(w){ return w.category === 'Inspiration'; }).length;

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Nothing here yet — go add some! 💪</div>';
        return;
      }

      list.innerHTML = filtered.map(function(w) {
        var imgHtml = w.image ? '<img src="' + w.image + '" style="width:80px;height:80px;object-fit:cover;border-radius:4px;flex-shrink:0;">' : '';
        var cat = w.category || 'Work';
        return '<div class="win-card ' + getCatClass(cat) + '">' +
          '<div class="win-card-text">' +
            '<span class="category-badge ' + getBadgeClass(cat) + '">' + cat + '</span>' +
            '<div class="tag">' + w.type + (w.title ? ' · ' + w.title : '') + '</div>' +
            '<div class="text">' + renderText(w.text, w.type) + '</div>' +
          '</div>' +
          imgHtml +
          '<button class="delete" data-id="' + w.firestoreId + '">✕</button>' +
          '<button class="edit" data-id="' + w.firestoreId + '">✏️</button>' +
        '</div>';
      }).join('');

      document.querySelectorAll('.delete').forEach(function(btn) {
        btn.addEventListener('click', function() { deleteWin(btn.getAttribute('data-id')); });
      });
      document.querySelectorAll('.edit').forEach(function(btn) {
        btn.addEventListener('click', function() { editWin(btn.getAttribute('data-id')); });
      });
    }

    function showRandom() {
      var spotlight = document.getElementById('spotlight');
      var pool = currentInspireFilter === 'all' ? wins : wins.filter(function(w) { return w.category === currentInspireFilter; });
      if (pool.length === 0) {
        spotlight.innerHTML = '<div class="empty">Nothing here yet — go add some! 💪</div>';
        return;
      }
      var win = pool[Math.floor(Math.random() * pool.length)];
      var imgHtml = win.image ? '<img src="' + win.image + '">' : '';
      var cat = win.category || 'Work';
      spotlight.innerHTML =
        '<div class="spotlight ' + getCatClass(cat) + '">' +
          '<div class="spotlight-text">' +
            '<span class="category-badge ' + getBadgeClass(cat) + '">' + cat + '</span>' +
            '<div class="tag">' + win.type + (win.title ? ' · ' + win.title : '') + '</div>' +
            '<div class="text">' + renderText(win.text, win.type) + '</div>' +
          '</div>' +
          imgHtml +
        '</div>';
    }

    document.querySelectorAll('[data-filter]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('[data-filter]').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentVaultFilter = btn.getAttribute('data-filter');
        renderVault();
      });
    });

    document.querySelectorAll('[data-cat]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('[data-cat]').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentInspireFilter = btn.getAttribute('data-cat');
      });
    });

    document.getElementById('upload-area').addEventListener('click', function() {
      document.getElementById('image-input').click();
    });

    document.getElementById('image-input').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(ev) {
        currentImageData = ev.target.result;
        var preview = document.getElementById('image-preview');
        preview.src = currentImageData;
        preview.style.display = 'block';
        document.getElementById('upload-area').textContent = '✅ Image attached — click to change';
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('btn-inspire').addEventListener('click', function() { showTab('inspire'); });
    document.getElementById('btn-vault').addEventListener('click', function() { showTab('vault'); });
    document.getElementById('btn-add').addEventListener('click', function() { showTab('add'); });
    document.getElementById('surprise-btn').addEventListener('click', showRandom);
    document.getElementById('save-btn').addEventListener('click', addWin);

    loadWins();
  </script>
</body>
</html>
