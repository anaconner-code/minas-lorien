<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Minas Lórien">
<meta name="theme-color" content="#1B2838">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minas Lórien</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: #2d3a3a;
      color: #dde4e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: #1e2d3a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    #login-box {
      background: #263340;
      border-radius: 8px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      text-align: center;
    }
    #login-box h2 {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 1.5em;
      letter-spacing: 0.15em;
      color: #c8d8d0;
      margin-bottom: 6px;
    }
    #login-box h2 span { color: #c9a84c; }
    #login-box p {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      color: #7a9a8a;
      font-size: 0.95em;
      margin-bottom: 28px;
    }
    #login-password {
      width: 100%;
      padding: 12px 16px;
      background: #1e2d3a;
      border: 1px solid #3a5a6a;
      border-radius: 4px;
      color: #dde4e0;
      font-family: 'EB Garamond', serif;
      font-size: 1.1em;
      text-align: center;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    #login-password:focus { outline: none; border-color: #c9a84c; }
    #login-btn {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: #c9a84c;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8em;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      transition: all 0.2s;
    }
    #login-btn:hover { background: #c9a84c; color: #1e2d3a; }
    #login-error {
      color: #cc6a6a;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.9em;
      margin-top: 12px;
      min-height: 1.2em;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }

    /* ── Main app ── */
    #app { display: none; flex-direction: column; flex: 1; }

    header {
      background: #1e2d3a;
      padding: 16px 30px;
      border-bottom: 1px solid #3a5a6a;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-icon { flex-shrink: 0; }
    .header-text h1 {
      font-family: 'Raleway', sans-serif;
      font-size: 1.6em;
      font-weight: 300;
      color: #c8d8d0;
      letter-spacing: 0.15em;
      margin: 0;
    }
    .header-text h1 span { color: #c9a84c; }
    .header-text p {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.95em;
      color: #7a9a8a;
      margin-top: 3px;
    }
    .tabs {
      display: flex;
      background: #1e2d3a;
      padding: 0 20px;
      border-bottom: 1px solid #3a5a6a;
    }
    .tab {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: #7a9a8a;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8em;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .tab.active { border-bottom-color: #c9a84c; color: #c8d8d0; }
    .tab:hover { color: #c8d8d0; }
    .content { flex: 1; padding: 25px 20px; overflow-y: auto; }
    .surprise-btn {
      display: block;
      margin: 0 auto 30px;
      padding: 14px 40px;
      background: transparent;
      color: #c9a84c;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.85em;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      width: 100%;
      max-width: 400px;
    }
    .surprise-btn:hover { background: #c9a84c; color: #1e2d3a; }
    .category-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 3px;
      border: 1px solid #3a5a6a;
      background: transparent;
      color: #7a9a8a;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: 0.75em;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #c9a84c; color: #c8d8d0; }
    .filter-btn.active {
      background: #c9a84c;
      border-color: #c9a84c;
      color: #1e2d3a;
      font-weight: 600;
    }
    .win-card {
      background: #263340;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      display: flex;
      gap: 15px;
      align-items: flex-start;
      box-shadow: 0 1px 6px rgba(0,0,0,0.2);
    }
    .win-card.cat-work { border-left: 3px solid #6aaacc; }
    .win-card.cat-creativity { border-left: 3px solid #a088cc; }
    .win-card.cat-family { border-left: 3px solid #6aaa88; }
    .win-card.cat-inspiration { border-left: 3px solid #c9a84c; }
    .win-card-text { flex: 1; min-width: 0; }
    .win-card .category-badge {
      display: inline-block;
      font-family: 'Raleway', sans-serif;
      font-size: 0.65em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 3px;
      margin-bottom: 6px;
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    .badge-work { background: #1a3040; color: #6aaacc; }
    .badge-creativity { background: #251a3a; color: #a088cc; }
    .badge-family { background: #1a3028; color: #6aaa88; }
    .badge-inspiration { background: #2a2010; color: #c9a84c; }
    .win-card .tag {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.85em;
      color: #7a9a8a;
      margin-bottom: 8px;
    }
    .win-card .text {
      font-family: 'EB Garamond', serif;
      font-size: 1em;
      line-height: 1.7;
      color: #dde4e0;
      word-break: break-word;
    }
    .win-card .card-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .win-card .delete {
      position: absolute;
      top: 8px; right: 8px;
      background: none;
      border: none;
      color: #3a5a6a;
      cursor: pointer;
      font-size: 1em;
      padding: 4px;
      transition: color 0.2s;
    }
    .win-card .delete:hover { color: #cc6a6a; }
    .win-card .edit {
      position: absolute;
      top: 8px; right: 30px;
      background: none;
      border: none;
      color: #3a5a6a;
      cursor: pointer;
      font-size: 1em;
      padding: 4px;
      transition: color 0.2s;
    }
    .win-card .edit:hover { color: #c9a84c; }

    /* ── File attachment display ── */
    .file-attachment {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1e2d3a;
      border: 1px solid #3a5a6a;
      border-radius: 4px;
      padding: 7px 12px;
      margin-top: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      max-width: 100%;
    }
    .file-attachment:hover { border-color: #c9a84c; background: #263340; }
    .file-attachment .file-icon { font-size: 1.2em; flex-shrink: 0; }
    .file-attachment .file-name {
      font-family: 'Raleway', sans-serif;
      font-size: 0.8em;
      color: #c8d8d0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .file-attachment .file-arrow { color: #7a9a8a; font-size: 0.9em; flex-shrink: 0; }

    /* ── Audio player ── */
    .audio-player {
      margin-top: 8px;
      width: 100%;
    }
    .audio-player audio {
      width: 100%;
      height: 32px;
      accent-color: #c9a84c;
    }
    .audio-label {
      font-family: 'Raleway', sans-serif;
      font-size: 0.75em;
      color: #7a9a8a;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1e2d3a;
      border: 1px solid #3a5a6a;
      border-radius: 4px;
      padding: 10px 14px;
      margin-top: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .link-card:hover { border-color: #c9a84c; background: #263340; }
    .link-card .link-icon { font-size: 1.3em; flex-shrink: 0; }
    .link-card .link-info { flex: 1; overflow: hidden; }
    .link-card .link-title {
      font-family: 'Raleway', sans-serif;
      font-size: 0.85em;
      color: #c8d8d0;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-card .link-url {
      font-size: 0.75em;
      color: #6aaacc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-card .link-arrow { color: #7a9a8a; }

    /* ── Link preview card (large) ── */
    .link-preview {
      display: block;
      background: #1e2d3a;
      border: 1px solid #3a5a6a;
      border-radius: 6px;
      margin-top: 10px;
      overflow: hidden;
      text-decoration: none;
      transition: all 0.2s;
    }
    .link-preview:hover { border-color: #c9a84c; background: #263340; }
    .link-preview-thumb {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: #263340;
    }
    .link-preview-thumb-placeholder {
      width: 100%;
      height: 160px;
      background: #263340;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5em;
    }
    .link-preview-info {
      padding: 10px 14px 12px;
    }
    .link-preview-title {
      font-family: 'Raleway', sans-serif;
      font-size: 0.9em;
      font-weight: 500;
      color: #c8d8d0;
      margin-bottom: 3px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .link-preview-domain {
      font-size: 0.75em;
      color: #6aaacc;
      font-family: 'Raleway', sans-serif;
    }

    .spotlight {
      background: #263340;
      border-radius: 8px;
      padding: 30px;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    @media (min-width: 600px) {
      .spotlight { flex-direction: row; align-items: center; }
    }
    .spotlight.cat-work { border-top: 2px solid #6aaacc; }
    .spotlight.cat-creativity { border-top: 2px solid #a088cc; }
    .spotlight.cat-family { border-top: 2px solid #6aaa88; }
    .spotlight.cat-inspiration { border-top: 2px solid #c9a84c; }
    .spotlight-text { flex: 1; }
    .spotlight .tag {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      color: #7a9a8a;
      margin-bottom: 12px;
      font-size: 0.95em;
      display: block;
    }
    .spotlight .text {
      font-family: 'EB Garamond', serif;
      font-size: 1.2em;
      line-height: 1.9;
      color: #dde4e0;
      word-break: break-word;
    }
    .spotlight img {
      width: 100%;
      max-width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      align-self: center;
    }
    .inspire-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 25px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .add-form {
      background: #263340;
      border-radius: 6px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    .add-form h3 {
      font-family: 'Raleway', sans-serif;
      font-size: 0.85em;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 18px;
      color: #c8d8d0;
    }
    .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .form-row select { flex: 1; min-width: 120px; margin-bottom: 0; }
    .add-form select, .add-form input, .add-form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      background: #1e2d3a;
      border: 1px solid #3a5a6a;
      border-radius: 4px;
      color: #dde4e0;
      font-family: 'EB Garamond', serif;
      font-size: 1em;
      transition: border-color 0.2s;
    }
    .add-form select:focus, .add-form input:focus, .add-form textarea:focus {
      outline: none;
      border-color: #c9a84c;
    }
    .add-form textarea { height: 120px; resize: vertical; }
    .add-form button {
      width: 100%;
      padding: 13px 25px;
      background: transparent;
      color: #c9a84c;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8em;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      transition: all 0.2s;
    }
    .add-form button:hover { background: #c9a84c; color: #1e2d3a; }

    /* ── File upload area ── */
    .file-upload-area {
      border: 1px dashed #3a5a6a;
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
      cursor: pointer;
      color: #7a9a8a;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      transition: all 0.2s;
    }
    .file-upload-area:hover { border-color: #c9a84c; color: #dde4e0; }
    .file-upload-area.has-file { border-color: #6aaa88; color: #6aaa88; border-style: solid; }
    .image-preview {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 4px;
      margin-bottom: 12px;
      display: none;
    }

    /* ── Upload progress ── */
    .upload-progress {
      display: none;
      margin-bottom: 12px;
    }
    .upload-progress-bar-wrap {
      background: #1e2d3a;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-top: 6px;
    }
    .upload-progress-bar {
      height: 100%;
      background: #c9a84c;
      border-radius: 4px;
      transition: width 0.2s;
      width: 0%;
    }
    .upload-progress-label {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.85em;
      color: #c9a84c;
    }

    .empty {
      text-align: center;
      color: #3a5a6a;
      padding: 40px;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 1.1em;
    }
    .count-badge {
      background: #1e2d3a;
      color: #7a9a8a;
      font-size: 0.75em;
      padding: 2px 7px;
      border-radius: 3px;
      margin-left: 6px;
    }
    .status-bar {
      text-align: center;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.85em;
      padding: 5px;
      background: #1e2d3a;
      color: #7a9a8a;
      border-bottom: 1px solid #3a5a6a;
    }
    .status-bar.synced { color: #6aaa88; }
    .status-bar.syncing { color: #c9a84c; }
    .status-bar.error { color: #cc6a6a; }
  </style>
</head>

    // ── Login ──────────────────────────────────────────────
    async function checkPassword() {
      var entered = document.getElementById('login-password').value.trim();
      if (!entered) return;
      try {
        var authDoc = await getDoc(doc(db, 'config', 'auth'));
        if (authDoc.exists() && authDoc.data().password === entered) {
          sessionStorage.setItem('ml-auth', 'true');
          document.getElementById('login-overlay').style.display = 'none';
          document.getElementById('app').style.display = 'flex';
          loadWins();
        } else {
          var box = document.getElementById('login-box');
          box.classList.remove('shake');
          void box.offsetWidth;
          box.classList.add('shake');
          document.getElementById('login-error').textContent = 'Incorrect password — try again.';
          document.getElementById('login-password').value = '';
          document.getElementById('login-password').focus();
        }
      } catch(e) {
        document.getElementById('login-error').textContent = 'Could not connect — check your internet.';
      }
    }

    if (sessionStorage.getItem('ml-auth') === 'true') {
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadWins();
    }

    document.getElementById('login-btn').addEventListener('click', checkPassword);
    document.getElementById('login-password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    // ── Helpers ────────────────────────────────────────────
    function setStatus(msg, type) {
      var bar = document.getElementById('status-bar');
      bar.textContent = msg;
      bar.className = 'status-bar ' + (type || '');
    }

    function getFileIcon(mimeType, fileName) {
      if (!mimeType && !fileName) return '📎';
      var mt = (mimeType || '').toLowerCase();
      var fn = (fileName || '').toLowerCase();
      if (mt.startsWith('image/')) return '🖼️';
      if (mt === 'application/pdf' || fn.endsWith('.pdf')) return '📄';
      if (mt.includes('word') || fn.endsWith('.doc') || fn.endsWith('.docx')) return '📝';
      if (mt.startsWith('audio/') || fn.endsWith('.mp3') || fn.endsWith('.m4a') || fn.endsWith('.wav') || fn.endsWith('.ogg')) return '🎵';
      if (mt.startsWith('video/') || fn.endsWith('.mp4') || fn.endsWith('.mov') || fn.endsWith('.webm')) return '🎬';
      return '📎';
    }

    function isAudio(mimeType, fileName) {
      var mt = (mimeType || '').toLowerCase();
      var fn = (fileName || '').toLowerCase();
      return mt.startsWith('audio/') || fn.endsWith('.mp3') || fn.endsWith('.m4a') || fn.endsWith('.wav') || fn.endsWith('.ogg');
    }

    function isImage(mimeType, fileName) {
      var mt = (mimeType || '').toLowerCase();
      var fn = (fileName || '').toLowerCase();
      return mt.startsWith('image/') || /\.(jpg|jpeg|png|gif|webp|svg)$/.test(fn);
    }

    function isURL(str) {
      return /^(https?:\/\/)[^\s]+/.test(str.trim());
    }

    function getDomain(url) {
      try { return new URL(url.trim()).hostname.replace('www.', ''); }
      catch(e) { return url.trim(); }
    }

    function getLinkIcon(url) {
      var domain = getDomain(url);
      if (domain.includes('youtube') || domain.includes('youtu.be')) return '▶️';
      if (domain.includes('tiktok')) return '🎵';
      if (domain.includes('instagram')) return '📸';
      if (domain.includes('twitter') || domain.includes('x.com')) return '🐦';
      if (domain.includes('linkedin')) return '💼';
      if (domain.includes('spotify')) return '🎧';
      if (domain.includes('pinterest')) return '📌';
      return '🔗';
    }

    // ── File upload to Firebase Storage ───────────────────
    function uploadFile(file) {
      return new Promise(function(resolve, reject) {
        var fileName = Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        var storageRef = ref(storage, 'wins/' + fileName);
        var uploadTask = uploadBytesResumable(storageRef, file);

        document.getElementById('upload-progress').style.display = 'block';

        uploadTask.on('state_changed',
          function(snapshot) {
            var pct = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
            document.getElementById('upload-progress-bar').style.width = pct + '%';
            document.getElementById('upload-progress-label').textContent = 'Uploading... ' + pct + '%';
          },
          function(error) {
            document.getElementById('upload-progress').style.display = 'none';
            reject(error);
          },
          async function() {
            var url = await getDownloadURL(uploadTask.snapshot.ref);
            document.getElementById('upload-progress').style.display = 'none';
            resolve({ url: url, fileName: file.name, fileType: file.type, storagePath: 'wins/' + fileName });
          }
        );
      });
    }

    // ── File picker ────────────────────────────────────────
    document.getElementById('upload-area').addEventListener('click', function() {
      document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      currentFile = file;
      currentFileName = file.name;
      currentFileType = file.type;

      var area = document.getElementById('upload-area');
      var preview = document.getElementById('image-preview');

      if (isImage(file.type, file.name)) {
        var reader = new FileReader();
        reader.onload = function(ev) {
          preview.src = ev.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      } else {
        preview.style.display = 'none';
      }

      area.textContent = getFileIcon(file.type, file.name) + ' ' + file.name + ' — click to change';
      area.classList.add('has-file');
    });

    // ── Render file attachment in cards ───────────────────
    function renderFileAttachment(fileURL, fileName, fileType) {
      if (!fileURL) return '';
      if (isImage(fileType, fileName)) {
        return '<img src="' + fileURL + '" class="card-image" style="width:80px;height:80px;object-fit:cover;border-radius:4px;flex-shrink:0;">';
      }
      if (isAudio(fileType, fileName)) {
        return '<div class="audio-player">' +
          '<div class="audio-label">' + getFileIcon(fileType, fileName) + ' ' + (fileName || 'Audio') + '</div>' +
          '<audio controls src="' + fileURL + '"></audio>' +
        '</div>';
      }
      var icon = getFileIcon(fileType, fileName);
      var name = fileName || 'Download file';
      return '<a class="file-attachment" href="' + fileURL + '" target="_blank" rel="noopener">' +
        '<span class="file-icon">' + icon + '</span>' +
        '<span class="file-name">' + name + '</span>' +
        '<span class="file-arrow">↗</span>' +
      '</a>';
    }

    // ── YouTube thumbnail helpers ──────────────────────────
    function getYouTubeID(url) {
      var m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      return m ? m[1] : null;
    }

    function isYouTube(url) {
      return !!(url && (url.includes('youtube.com') || url.includes('youtu.be')));
    }

    // Build a preview card element and inject thumbnail async
    function buildLinkPreview(url, containerEl) {
      var domain = getDomain(url);
      var icon = getLinkIcon(url);
      var ytId = getYouTubeID(url);

      // Create the card skeleton
      var a = document.createElement('a');
      a.className = 'link-preview';
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener';

      var thumbDiv = document.createElement('div');
      thumbDiv.className = 'link-preview-thumb-placeholder';
      thumbDiv.textContent = icon;

      var info = document.createElement('div');
      info.className = 'link-preview-info';
      info.innerHTML =
        '<div class="link-preview-title">' + domain + '</div>' +
        '<div class="link-preview-domain">' + domain + '</div>';

      a.appendChild(thumbDiv);
      a.appendChild(info);
      containerEl.appendChild(a);

      // Fetch thumbnail
      if (ytId) {
        // YouTube: direct thumbnail URL, no API needed
        var img = document.createElement('img');
        img.className = 'link-preview-thumb';
        img.src = 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
        img.alt = '';
        img.onload = function() { a.replaceChild(img, thumbDiv); };
        img.onerror = function() { /* keep placeholder */ };
      } else {
        // Any other link: use microlink.io to fetch og:image + title
        fetch('https://api.microlink.io/?url=' + encodeURIComponent(url) + '&screenshot=false')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && data.data) {
              // Update title if available
              if (data.data.title) {
                info.querySelector('.link-preview-title').textContent = data.data.title;
              }
              // Update thumbnail if available
              var imgUrl = data.data.image && data.data.image.url;
              if (imgUrl) {
                var img = document.createElement('img');
                img.className = 'link-preview-thumb';
                img.src = imgUrl;
                img.alt = '';
                img.onload = function() { a.replaceChild(img, thumbDiv); };
                img.onerror = function() { /* keep placeholder */ };
              }
            }
          })
          .catch(function() { /* keep placeholder on error */ });
      }
    }

    function renderText(text, type, cardEl) {
      var cleanText = text.trim();

      if (type === 'Link' && isURL(cleanText)) {
        // Return placeholder div; thumbnail built async after render
        if (cardEl) {
          setTimeout(function() {
            var ph = cardEl.querySelector('.link-preview-placeholder');
            if (ph) buildLinkPreview(cleanText, ph.parentNode);
          }, 0);
        }
        return '<div class="link-preview-placeholder" data-url="' + cleanText + '"></div>';
      }

      // For non-Link types, auto-linkify any URLs in the text
      return text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
        return '<a class="link-card" href="' + url + '" target="_blank" rel="noopener" style="display:inline-flex;margin-top:6px;">' +
          '<span class="link-icon">🔗</span>' +
          '<span class="link-info"><span class="link-url">' + url + '</span></span>' +
          '<span class="link-arrow">→</span></a>';
      });
    }

    // ── Tabs ───────────────────────────────────────────────
    function showTab(name) {
      ['inspire','vault','add'].forEach(function(t) {
        document.getElementById('tab-' + t).style.display = 'none';
        document.getElementById('btn-' + t).classList.remove('active');
      });
      document.getElementById('tab-' + name).style.display = 'block';
      document.getElementById('btn-' + name).classList.add('active');
      if (name === 'vault') renderVault();
    }

    // ── Load wins ──────────────────────────────────────────
    async function loadWins() {
      try {
        setStatus('⏳ Loading your vault...', 'syncing');
        var snapshot = await getDocs(winsCollection);
        wins = [];
        snapshot.forEach(function(docSnap) {
          wins.push(Object.assign({ firestoreId: docSnap.id }, docSnap.data()));
        });
        setStatus('✅ Vault synced · ' + wins.length + ' entries', 'synced');
        renderVault();
      } catch(e) {
        setStatus('⚠️ Could not connect — check your internet', 'error');
        console.error('Firebase error:', e);
      }
    }

    // ── Save / update win ──────────────────────────────────
    async function addWin() {
      var category = document.getElementById('win-category').value;
      var type = document.getElementById('win-type').value;
      var title = document.getElementById('win-title').value.trim();
      var text = document.getElementById('win-text').value.trim();
      if (!text) { alert('Please add some content!'); return; }

      var fileURL = currentFileURL || null;
      var fileName = currentFileName || null;
      var fileType = currentFileType || null;
      var storagePath = null;

      try {
        setStatus('⏳ Saving...', 'syncing');

        // Upload new file if one was selected
        if (currentFile) {
          var uploaded = await uploadFile(currentFile);
          fileURL = uploaded.url;
          fileName = uploaded.fileName;
          fileType = uploaded.fileType;
          storagePath = uploaded.storagePath;
        }

        var entry = {
          category: category,
          type: type,
          title: title,
          text: text,
          fileURL: fileURL,
          fileName: fileName,
          fileType: fileType,
          storagePath: storagePath,
          createdAt: Date.now()
        };

        if (editingId) {
          await updateDoc(doc(db, 'wins', editingId), entry);
          editingId = null;
        } else {
          await addDoc(winsCollection, entry);
        }

        setStatus('✅ Saved!', 'synced');
        resetForm();
        await loadWins();
        showTab('vault');
      } catch(e) {
        setStatus('⚠️ Could not save — ' + e.message, 'error');
      }
    }

    function resetForm() {
      document.getElementById('win-title').value = '';
      document.getElementById('win-text').value = '';
      document.getElementById('image-preview').style.display = 'none';
      document.getElementById('upload-area').textContent = '📎 Click to attach a file — image, PDF, Word doc, audio, or video (optional)';
      document.getElementById('upload-area').classList.remove('has-file');
      document.getElementById('file-input').value = '';
      document.getElementById('add-form-title').textContent = 'Add a New Entry';
      document.getElementById('save-btn').textContent = 'Save to Minas Lórien ✨';
      currentFile = null;
      currentFileURL = null;
      currentFileName = null;
      currentFileType = null;
    }

    // ── Delete win ─────────────────────────────────────────
    async function deleteWin(firestoreId) {
      var win = wins.find(function(w) { return w.firestoreId === firestoreId; });
      try {
        setStatus('⏳ Deleting...', 'syncing');
        // Delete file from Storage if it exists
        if (win && win.storagePath) {
          try { await deleteObject(ref(storage, win.storagePath)); } catch(e) { /* ignore if already gone */ }
        }
        await deleteDoc(doc(db, 'wins', firestoreId));
        await loadWins();
        setStatus('✅ Deleted', 'synced');
      } catch(e) {
        setStatus('⚠️ Could not delete', 'error');
      }
    }

    // ── Edit win ───────────────────────────────────────────
    function editWin(firestoreId) {
      var win = wins.find(function(w) { return w.firestoreId === firestoreId; });
      if (!win) return;
      document.getElementById('win-category').value = win.category || 'Work';
      document.getElementById('win-type').value = win.type;
      document.getElementById('win-title').value = win.title || '';
      document.getElementById('win-text').value = win.text;

      var area = document.getElementById('upload-area');
      var preview = document.getElementById('image-preview');

      if (win.fileURL) {
        currentFileURL = win.fileURL;
        currentFileName = win.fileName || null;
        currentFileType = win.fileType || null;
        if (isImage(win.fileType, win.fileName)) {
          preview.src = win.fileURL;
          preview.style.display = 'block';
        } else {
          preview.style.display = 'none';
        }
        var icon = getFileIcon(win.fileType, win.fileName);
        area.textContent = icon + ' ' + (win.fileName || 'File attached') + ' — click to change';
        area.classList.add('has-file');
      } else {
        // Legacy: handle old base64 image entries
        if (win.image) {
          preview.src = win.image;
          preview.style.display = 'block';
          area.textContent = '🖼️ Image attached (legacy) — click to replace';
          area.classList.add('has-file');
        } else {
          preview.style.display = 'none';
          area.textContent = '📎 Click to attach a file — image, PDF, Word doc, audio, or video (optional)';
          area.classList.remove('has-file');
        }
        currentFileURL = null;
        currentFileName = null;
        currentFileType = null;
      }

      currentFile = null;
      editingId = firestoreId;
      document.getElementById('add-form-title').textContent = 'Edit Entry';
      document.getElementById('save-btn').textContent = 'Update Entry ✨';
      showTab('add');
    }

    // ── Render vault ───────────────────────────────────────
    function getCatClass(cat) { return 'cat-' + cat.toLowerCase(); }
    function getBadgeClass(cat) { return 'badge-' + cat.toLowerCase(); }

    function renderVault() {
      var list = document.getElementById('vault-list');
      var filtered = currentVaultFilter === 'all' ? wins : wins.filter(function(w) { return w.category === currentVaultFilter; });

      document.getElementById('count-all').textContent = wins.length;
      document.getElementById('count-work').textContent = wins.filter(function(w){ return w.category === 'Work'; }).length;
      document.getElementById('count-creativity').textContent = wins.filter(function(w){ return w.category === 'Creativity'; }).length;
      document.getElementById('count-family').textContent = wins.filter(function(w){ return w.category === 'Family'; }).length;
      document.getElementById('count-inspiration').textContent = wins.filter(function(w){ return w.category === 'Inspiration'; }).length;

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Nothing here yet — go add some! 💪</div>';
        return;
      }

      list.innerHTML = filtered.map(function(w) {
        var cat = w.category || 'Work';
        var fileHTML = '';
        if (w.fileURL) {
          fileHTML = renderFileAttachment(w.fileURL, w.fileName, w.fileType);
        } else if (w.image) {
          fileHTML = '<img src="' + w.image + '" class="card-image" style="width:80px;height:80px;object-fit:cover;border-radius:4px;flex-shrink:0;">';
        }
        var isImg = w.fileURL ? isImage(w.fileType, w.fileName) : !!w.image;
        return '<div class="win-card ' + getCatClass(cat) + '" data-id="' + w.firestoreId + '">' +
          '<div class="win-card-text">' +
            '<span class="category-badge ' + getBadgeClass(cat) + '">' + cat + '</span>' +
            '<div class="tag">' + w.type + (w.title ? ' · ' + w.title : '') + '</div>' +
            '<div class="text">' + renderText(w.text, w.type) + '</div>' +
            (!isImg ? fileHTML : '') +
          '</div>' +
          (isImg ? fileHTML : '') +
          '<button class="delete" data-id="' + w.firestoreId + '">✕</button>' +
          '<button class="edit" data-id="' + w.firestoreId + '">✏️</button>' +
        '</div>';
      }).join('');

      // Wire up async link previews
      document.querySelectorAll('.link-preview-placeholder').forEach(function(ph) {
        var url = ph.getAttribute('data-url');
        if (url) buildLinkPreview(url, ph.parentNode);
        ph.remove();
      });

      document.querySelectorAll('.delete').forEach(function(btn) {
        btn.addEventListener('click', function() { deleteWin(btn.getAttribute('data-id')); });
      });
      document.querySelectorAll('.edit').forEach(function(btn) {
        btn.addEventListener('click', function() { editWin(btn.getAttribute('data-id')); });
      });
    }

    // ── Inspire tab ────────────────────────────────────────
    function showRandom() {
      var spotlight = document.getElementById('spotlight');
      var pool = currentInspireFilter === 'all' ? wins : wins.filter(function(w) { return w.category === currentInspireFilter; });
      if (pool.length === 0) {
        spotlight.innerHTML = '<div class="empty">Nothing here yet — go add some! 💪</div>';
        return;
      }
      var win = pool[Math.floor(Math.random() * pool.length)];
      var cat = win.category || 'Work';

      // Build file attachment HTML for all types
      var attachHTML = '';
      if (win.fileURL) {
        if (isImage(win.fileType, win.fileName)) {
          attachHTML = '<img src="' + win.fileURL + '" style="width:100%;max-width:200px;height:200px;object-fit:cover;border-radius:6px;flex-shrink:0;align-self:center;">';
        } else if (isAudio(win.fileType, win.fileName)) {
          attachHTML = '<div class="audio-player" style="width:100%;">' +
            '<div class="audio-label">' + getFileIcon(win.fileType, win.fileName) + ' ' + (win.fileName || 'Audio') + '</div>' +
            '<audio controls src="' + win.fileURL + '"></audio>' +
          '</div>';
        } else {
          attachHTML = '<a class="file-attachment" href="' + win.fileURL + '" target="_blank" rel="noopener">' +
            '<span class="file-icon">' + getFileIcon(win.fileType, win.fileName) + '</span>' +
            '<span class="file-name">' + (win.fileName || 'Download file') + '</span>' +
            '<span class="file-arrow">↗</span>' +
          '</a>';
        }
      } else if (win.image) {
        attachHTML = '<img src="' + win.image + '" style="width:100%;max-width:200px;height:200px;object-fit:cover;border-radius:6px;flex-shrink:0;align-self:center;">';
      }

      spotlight.innerHTML =
        '<div class="spotlight ' + getCatClass(cat) + '">' +
          '<div class="spotlight-text">' +
            '<span class="category-badge ' + getBadgeClass(cat) + '">' + cat + '</span>' +
            '<div class="tag">' + win.type + (win.title ? ' · ' + win.title : '') + '</div>' +
            '<div class="text">' + renderText(win.text, win.type) + '</div>' +
            (attachHTML && !isImage(win.fileType, win.fileName) && !win.image ? attachHTML : '') +
          '</div>' +
          ((isImage(win.fileType, win.fileName) || win.image) ? attachHTML : '') +
        '</div>';

      // Wire up async link previews in spotlight
      spotlight.querySelectorAll('.link-preview-placeholder').forEach(function(ph) {
        var url = ph.getAttribute('data-url');
        if (url) buildLinkPreview(url, ph.parentNode);
        ph.remove();
      });
    }

    // ── Event listeners ────────────────────────────────────
    document.querySelectorAll('[data-filter]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('[data-filter]').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentVaultFilter = btn.getAttribute('data-filter');
        renderVault();
      });
    });

    document.querySelectorAll('[data-cat]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('[data-cat]').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        currentInspireFilter = btn.getAttribute('data-cat');
      });
    });

    document.getElementById('btn-inspire').addEventListener('click', function() { showTab('inspire'); });
    document.getElementById('btn-vault').addEventListener('click', function() { showTab('vault'); });
    document.getElementById('btn-add').addEventListener('click', function() { showTab('add'); });
    document.getElementById('surprise-btn').addEventListener('click', showRandom);
    document.getElementById('save-btn').addEventListener('click', addWin);
  </script>
</body>
</html>
